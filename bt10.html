<script>
    let mang = [1, 7, 5, 9, 2, 6];
    let count = 0;
    let sum=0;

    let tbc = 0;
    for (let i = 0; i < mang.length; i++) {
        if (mang[i] %5===0) {
            sum +=mang[i];
            count++;
        }
    }
    tbc=sum/count;
    console.log(tbc);
</script>
