<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>
    let mang = [1, 7, 5, 9, 2, 6];
    let max1 = 0;
    let max2 = 0;
    for (let i = 0; i < mang.length; i++) {
        if (mang[i] >= max1) {
            max2 = max1;
            max1 = mang[i];

        } else if (mang[i] < max1 && mang[i] >= max2) {
            max2 = mang[i];
        }
    }
    console.log(max2);
</script>
